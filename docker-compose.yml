services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: brain-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333

  jasper-embedder:
    build:
      context: .
      dockerfile: services/jasper-embedder/Dockerfile
    container_name: brain-jasper-embedder
    ports:
      - "8001:8001"
    environment:
      JASPER_MODEL_NAME: infgrad/Jasper-Token-Compression-600M
      QDRANT_VECTOR_SIZE: 2048

volumes:
  qdrant_storage:
