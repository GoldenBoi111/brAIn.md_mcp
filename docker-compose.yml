version: '3.9'

services:
  # Vector database for semantic search and embeddings
  qdrant:
    image: qdrant/qdrant:latest
    container_name: brain-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - brain-network

  # Jasper token compression embedding model
  jasper-embedder:
    build:
      context: .
      dockerfile: services/jasper-embedder/Dockerfile
    container_name: brain-jasper-embedder
    ports:
      - "8001:8001"
    environment:
      JASPER_MODEL_NAME: infgrad/Jasper-Token-Compression-600M
      QDRANT_VECTOR_SIZE: 2048
      EMBEDDER_HOST: 0.0.0.0
      EMBEDDER_PORT: 8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      - qdrant
    networks:
      - brain-network

  # Next.js app with vault and MCP server
  brain-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brain-app
    ports:
      - "3000:3000"
    volumes:
      # Persistent vault storage across container restarts
      - vault_storage:/app/vaults
      # Auth and JWT state
      - auth_storage:/app/.auth
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_APP_NAME: brAIn.md
      NEXT_PUBLIC_APP_URL: http://localhost:3000

      # Vault configuration
      VAULT_ROOT: /app/vaults

      # Qdrant configuration
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: vault_chunks
      QDRANT_VECTOR_SIZE: 2048
      QDRANT_TIMEOUT_SECONDS: 30

      # Jasper embedder configuration
      JASPER_EMBEDDER_URL: http://jasper-embedder:8001
      JASPER_MODEL_NAME: infgrad/Jasper-Token-Compression-600M
      JASPER_EMBEDDER_TIMEOUT_SECONDS: 60
      JASPER_MAX_LENGTH: 1024

      # Auth and security
      USER_AUTH_SECRET: ${USER_AUTH_SECRET:-replace-with-a-long-random-secret}
      USER_AUTH_STORE_PATH: /app/.auth/users.json
      USER_SESSION_COOKIE: brain_session
      USER_SESSION_TTL_SECONDS: 2592000

      # MCP (Model Context Protocol) configuration
      MCP_JWT_SECRET: ${MCP_JWT_SECRET:-replace-with-a-long-random-secret}
      MCP_JWT_ISSUER: brAIn-mcp
      MCP_JWT_AUDIENCE: brAIn-mcp
      MCP_JWT_REVOCATION_PATH: /app/vaults/.mcp-jwt-revocations.json
      MCP_USAGE_LOG_PATH: /app/vaults/.mcp-jwt-usage.jsonl
      MCP_RATE_LIMIT_PER_HOUR: 60

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

    depends_on:
      qdrant:
        condition: service_healthy
      jasper-embedder:
        condition: service_healthy

    networks:
      - brain-network

volumes:
  # Qdrant persistent vector storage
  qdrant_storage:
    driver: local

  # Vault root directory with file content, locks, and metadata
  vault_storage:
    driver: local

  # User authentication data
  auth_storage:
    driver: local

networks:
  brain-network:
    driver: bridge
